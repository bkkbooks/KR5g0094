front:
  text: 翊聖保德傳卷中
  hash: sha256:46bc4ef6d9069388de1da4d2a2f7ffb4776946c8147c763cb408e3cf5c9e66c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0094_HFL_002-001a, image: hfl/1006/1006-028.png}
body:
  text: 宋開府儀同三司同中書門下平章事上柱國太原郡開國公王欽若奉勑編集真君之降世也或時有所㖟人即傳録而岐雍之民有物魅妖怪爲害之極者皆投誠致告則守真祈禱奉教而往無不祛殄凡所靈驗不可勝紀今録其傳聞者云守真嘗朝禮至玉皇大殿睹其額曰通明殿不曉其旨因焚香告曰通明之誼竊所未喻敢祈真教真君曰上帝在無上三天爲諸天之尊萬象群仙無不臣者常升金殿殿之光明照於帝身身之光眀照於金殿光明通徹無所不照故爲通明殿諸天帝君萬靈侍衛仙衆梵佛悉來朝謁仰視其殿惟見大光明中上帝儼然仙班既退光明徧散諸天焉有王叟者年七十餘少事戎帥老而退居終南鎮膽氣雄傑談五代時事歷歷可聽每聞妖怪誕妄之事則扼腕切齒自真君之始降未甚信嚮洎目睹靈異歆然歸仰自後常日二時赴宫焚香伏拜雖風雨霜雪未嘗暫曠一日忽告守真啓殿門瞻禮焚香且泣曰老夫本懷剛氣幼事軍門不信邪魔常守正直百生有幸得遇上真今已衰耗大期將至所願歸全之後得在左右以備驅使爲萬足矣真君降言而許之未幾叟無疾而終踰旬守真忽於真君殿側聞空中有呼其名者曰我鐵輪將軍也汝何以略不見録守真仰而問曰真君左右有四將軍常侍殿中守真常所虔事未知鐵輪將軍是何星辰名位空中又曰我即王叟也曾有至願乞侍左右今蒙收録使掌鐵輸位在四將軍之下汝今後或有醮祭勿忘吾名也真君嘗謂守真曰吾每巡遊周天有諸位靈官捷疾吏兵數逾百萬彗孛妖沴知吾騎從所至皆屏跡遠避嶽鎮海瀆可以麾召而世之物魅邪怪豈足數耶吾念汝正直付汝劒法俾汝爲民救患禳災汝宜精勤無或懈怠積功於民加惠及物上天所鑒當録汝名若慢道輕教不守虛寂自有陰責矣吾若一怒萬物立爲埃塵汝其可當乎然汝每有責罰乃有五小將軍怒汝不專勤耳汝自宜致恭於彼汝所興念彼各豫知不可欺心貽汝禍患守真嘗一日從容焚香虔誠問曰守真覩釋氏之教言天上天下無如佛者未知三清之上品位何若願賜真語以蠲蒙滯真君降言曰佛即西方得道之聖人也在三清之中别有梵天居之於上帝則如世之九卿奉天子也守真曰其教流演頗盛於世又何理也真君曰教流中聚帝之念也守真曰道釋經典並垂於世未審崇奉何者即獲其福真君曰太上道德經大無不包細無不納修身鍊行治家治國世人若悟其指歸達其妙用造次於是信奉而行豈惟增福諒無所不至矣釋氏之四十二章經制心治性去貪遠禍垂慈訓誡證以善惡亦一貫於道矣奉之求福固亦無涯至于周公孔子皆列仙品而五經六籍治世之法治民之術盡在此矣世雖諷誦多不依從若口誦而心隨心隨而事應仁義言行禮智之道常存于懷豈惟正其人事長生久視之理亦何遠矣守真又嘗啓請云終南山中赤谷神祠者近郷之人多所祈祀屠牛擊豖以爲饗饌酒樂喧沸民氓鼓舞若斯之事其獲祐乎真君曰終南山寔名山地寔福地人凡境聖今古皆然興邪致妖殺命祈福以兹俟祐斯亦遠矣既而草竊潜匿於其下捕賊者積薪焚之祠宇煨燼寂無靈異建隆末長安進士劉頑頗有文學出於流輩嘗詣宫再拜懇禱曰頑欲知將來位秩高卑願賜靈誥真君降言曰天賦汝文性不賦汝禄位汝若學道退閑當猶延永若妄求進身慮促汝壽筭也頑聞之不悅而退後三載果無成而卒雍熙中華山希夷先生陳摶卒於張超谷石室中世多傳其羽化守真朝禮之次因焚香啓告曰華山陳摶近卒時人謂之尸解未審其人功行證仙階乎敢希上真略賜指諭真君降言曰摶之鍊氣養神頗得其要然及物之功未至但有所主掌耳端拱中知鳳翔府比部郎中高凝祜嘗詣宫致禮既去真君忽降言於監宫李鑄曰高凝祜行虧忠信死非久矣鑄竊志之俄而凝祜秩滿還京爲三司判官鑄聞之乃復焚香啓告曰高凝祜今爲此職又何福耶真君降言曰死將至矣數月而凝祜卒吏部尚書宋白乾德中家于盩厔有弟小字曰岐哥年十餘歲爲狐魅所惑號呼無度舉動失常忽力敵數夫家人莫能制醫砭之輩至者必遭凌扑白因齋心遣所親詣宫致禱懇求衛護真君降言曰汝去吾當令守真往彼守真受教而往方至其家坐於客館而岐哥已覺慞惶失次家人遽出迎拜守真具問之因厲聲呼其名須臾岐哥自捽其首從中唯唯而出至守真前戰汗悚息守真呵責移時鬼乃露形叩頭伏罪守真以術戮之應手而斃岐哥仆地良久而蘇即獲平愈真君嘗忽謂守真曰山下李靖廟中有狐鬼數十盤泊於彼本方地神適有馳報慮其爲妖害民汝可速往逐之守真禀命仗劒而去須臾坐於廟前震呼數四俄而狐鬼數十悉出遍列於前惶惑驚怖守真乃責之曰此上真下降之地汝輩豈宜雜處今未欲戮汝可速返林莽無以血污吾靈劍鬼等相顧狼狽匍匐而散守真自往至還曾不移時有寓宫道士王德淵問其所適守真具道之德淵曰自此至彼往復二十里何其速耶守真曰我離廟時以劒揮下庭樹低枝在地汝可驗也德淵俟曉躍馬而觀焉果於廟前聞腥穢之氣不可近得斷枝而還始再拜稱異時又有妖狐數百在邠州城中頗爲怪異守真聞之因焚香致告具道其事願奉教往彼除之真君降言曰此狐妖輩嘗於長安南山中化形爲菩薩之狀誘彼居民捨財爲供其間迴心歸善亦十有八九上帝以此故授其符命俾爲邠州土地亦有數限俟其歲滿當自遠去無能爲害汝不必往也開寶中鳳翔府民陳英美家有山魈爲怪投擲瓦礫日盈其庭時放煙焰欲焚其舍財物耗散親族愁苦召術士禳禁命僧徒課誦皆不能止乃移居遠遁亦躡跡而至英美計無所出因齋戒持香果詣宫精虔以告真君降言謂守真曰汝速受吾令往爲遣除守真再拜負劒躍馬再宿而至其家而擲瓦之聲喧囂如故觀者填咽皆曰此道士必不能去此怪守真乃盥滌嚴潔整衣引劒而入其怪忽然而止是夕爲壇於庭中守真噀劒立其上厲聲徐呼曰山魈鬼何在乎儻爲妖未已當出與吾較勝不然則當去萬里之外釋汝之罪如此移時悄無影響自是其家安肅乃隨守真詣宫陳醮以謝焉又長安富民楊氏家亦有鬼物爲怪擲瓦縱火一日萬變聚族憂惶莫可寧處時有術士李捉鬼者尤善符禁楊氏召之方及其門若爲物所擊匍匐而起俄復顛隕如是者三遂狼狽而走楊氏復召僧衆爲道場誦經作梵唄以祛之俄又若有物攫其道具或投於屋或葉於井羣僧惶懼而去乃至擣衣砧石亦自空中騰起三三兩兩相逐而落庭中遇物凌觸而物無所損如是之怪尤衆不可具紀楊氏素聞真君之靈乃躬持香燭等馳赴焚禱具言其恠且求驅殄真君降言曰汝當速歸吾令守真繼往也守真尋再拜而往其家士民觀者填溢其户守真易衣整冠呪水揮劍行於四隅其怪即寂然無聲守真謂楊氏曰此妖伏矣請爲醮以祛之向夕結壇焚章禮畢而去一城之衆稽首稱歎守真既歸楊氏隨詣宫中陳醮以謝又富民劉文者忽爲狐鬼所惑心神恍惚動止不寧市中逢道流語曰子面有妖氣必爲邪物所著真君下降可虔心禱之必愈斯疾文乃自齎香燭晨夕馳赴中路爲鬼物所追或爲僧尼婦女或爲商賈萬端誘惑不進文既迷且惑復遇道流於路具告其故道流謂曰是皆鬼物也汝宜徑往無或退志爲羣妖所害文心悟不數日奔追至宫潔齋懇至百拜殿下真君降言曰知汝遠來吾今令守真爲汝除邪是夕守真立文於庭中守真杖劒噀水呵叱數四文懵然踣於地移時而起曰適先生呵叱之際見數人若神將者各擒二鬼而去文惶駭不覺顚仆今神思清爽如酣醉之始醒也百拜而去翊聖保德傳卷中
