front:
  text: 翊聖保德傳卷下陞三
  hash: sha256:aeb1a5212c4565e0a26015da970a51cd3a52483cd20ccbf66771ed1f9557cb1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0094_HFL_003-001a, image: hfl/1006/1006-046.png}
body:
  text: 宋開府儀同三司同中書門下平章事上柱國太原郡開國公王欽若奉勑編集自真君之臨降官吏民庶不遠千里或馳誠遥禱或齋潔朝拜以祈真㖟時有所聞大抵多隨其性習加以訓朂人臣依於忠人子依於孝清淳者示之格言貪酷者警以要道詞甚平易頗葉音韻然獲聞之者至寡今據其所傳録之如左乾德中驪山白鹿觀道士馮洞元朝禮之次焚香虔告曰洞元講孔子之書依老子之教積有年矣而修身鍊行未得真旨幸逢上聖敢求一言真君降言曰到境始知安形忙靈物閑真空須照達幽微即大還動觀無障礙希夷合自然功成神莫測變化可沖天去住由自己三官赦舊愆命曹除罪簿六丁奏上天衆生要修道須知无上源洞元百拜虔謝而去開寳中侍御史路沖奉詔知鳳翔府就宫禮請守真就府署中陳醮祈降是夕潔齋致禱曰沖身拘職守阻拜真儀輙以蘋藻虔祈降鑒乞賜真語以導蒙昧真君降言曰盡力事君以爲忠臣濁財勿顧邪事莫聞整雪刑嶽救療人民動合王道終爲吉人積愆爲咎必有沈淪衆生本無形之性配有形之軀曠劫以來不能自悟自有無極世界不夜之鄉混合太虚杳冥同理又曰六合乾坤内衆生多不會造業向前行如盲驀江海如將智惠觀自越千重海沖再拜録而誦之左補闕王龜從一日齋心詣宫焚香懇禱曰凡庸賤類釁咎無涯幸逢上真願賜靈誨如何修身得獲遐壽真君降言曰勸汝修煉莫如精勤精勤不怠上聖皆聞太平降世用武興文無文則不正用文則益君食禄利勿違王命行吉善但守清貧清貧者響合天地濁富者像火投冰投冰者火縁漸滅積惡者自貫其身自貫者殃及七祖地府下痛害及親吾懸千尺之索提釣有縁之人道之尊德之貴大道能生一切物衆生頭像天足像地中心空然合真理鑿户牖以爲室房室之中有一物亦無影亦無形杳杳冥冥人不識若能識者得長生陽在天陰在地二氣同和誠有謂空中造化乃自然自然之中生萬類天不高地不卑大道混合虚无理學道衆生審欲聞此是修行崇妙門開寳中丞相沈倫嘗連綿卧疾虔心遣使詣宫陳醮致告曰倫濁穢之質病惱所侵如何修行得免兹患敢祈聖語以導愚蒙真君降言曰靈物不病形軀自安形軀有病返照而看來人録之歸致於倫倫捧覽之驚喜曰吾得之矣尋而疾愈復遣人詣宫醮謝道士王德淵因遊終南山寓止宫中勤奉香火好養生而性褊多所恚怒忽一日真君降言謂之曰汝學道修真先當調習其性以順天和忘諸有爲勿耗心識融怡凝湛道乃可見復戒之曰莫管内莫管外來往真虚無罣礙所居安樂是汝家各自勤行莫相待先達之人難滯礙真空妙樂有天堂與聖相同滅諸罪又曰妙理須行到周旋皆合道舉措見真空真空無煩惱混合太虚中自有無聲樂地爐天竈間背凡歸聖道常將智惠觀可向今生了德淵曰上感真君降言教示不曉前篇内與聖相同滅諸罪願垂誨諭真君曰汝若除煩入静鍊心修真積累其功數盈之後泥丸百節元神靈通而自同於聖天堂妙樂無所不至豈更有諸罪也故言與聖相同滅諸罪太平興國中駕部員外郎李鑄嘗知鳳翔府備睹靈應俄復奉詔監宫凡十餘年志頗嚴潔真君前後降語僅十餘篇其存録者數首一曰建隆之初方禀希夷上帝命吾衆聖皆知乘龍下降列宿相隨五嶽受命主張地祇潜扶社稷密佐明時吾要李鑄知吾降期不得輕泄免漏天機又曰與吾獨異佐國與吾以道理民與吾慈善理家與吾不飲自醉醒時理民醉時理神此語是延年益壽之法吾勸府主記取又曰爲官求理在貞明智惠俱通臨事清觀天行道合陰德食君爵禄常若驚爲吾洗心復换骨背凡入聖奔長生天宫快樂勝凡世不夜之郷挂一名又曰府主累世爲人降生中國與吾清直莫行邪曲與吾積善累功與吾佐輔明主與吾洗雪黎民與吾掛心刑獄上帝若知名天官也尅取捨住世輪流之財但修取有形之像獲隨身之功得無量之福與吾不得因循不奈時光迅速靈官賞汝功勳天曹與汝添福若一一依吾聖言必得延年益壽又曰年登七十餘住世不久居饒君壽百歲問汝得幾秋地府直須怕冥司難請求有功無驚懼積罪必遭誅子孫難替代早覺莫癡愚又曰有縁無縁福業相牽有縁福至無縁業纒三業大罪信根不圓若遵吾語如倚太山又曰聽吾之言必延汝年亦將康健保安自然志誠不退修真理今生若在玉皇前又曰爲汝虔心星辰下降來駕於玄風去乘於法雨開盲愚之耳目迴積惡之人心盡歸投正路因汝醮告上玄惡人盡來歸敬此汝之功也吾已與汝聞於上帝俾汝獲福也汝宜清者重清白者重白明者重明勿初勤末怠中路變異迴清爲濁迴善爲惡設靈官奏聞上帝若知有誤於吾也又七月十日夜真君降言汝忠勤奉國惠愛治民更要用心勿違吾誡未遇吾之前所作諸惡吾與汝並銷除也遇吾之後況無諸業左右已録汝功也更須晨夕與吾積其善功勿得怠惰吾聖言也又曰但行王事洗雪冤沉常差靈官護助汝也或有諸事常行平正依吾聖言況是太平君治化諸事前程汝但莫憂又云托托莫憂煩軍府自然安每事依王道從他天下傳又曰爲主虔誠拜上玄宋朝社稷保長安不久太平天下樂一家受福管長安又曰爲主合虔誠將心助太平天宫繫其職每事更宜精衆聖皆知汝舉措直須驚一朝功滿後永住看三清又曰生前莫亂憂已後亦無愁主判陽間事凡人得幾秋但依聖言著長生天上求鑄每受一篇未嘗不晨夕諷誦焉又嘗謂鑄曰汝年及八十别無修鍊之功未免掩形升魂亦當有所主掌耳鑄再拜曰此生得遇上真下降屢受祕語他日儻獲主掌願與守真同列真君曰人間官職守真不及汝天上名位汝不及守真也但心歸真正升仙階亦有時矣淳化中西京留守中書令趙普嘗遣使備禮致醮虔祈願聞休咎真君降言曰趙普扶持社稷甚有功勳上天所知賜汝福壽以大妨小幽府亦有冤對當啓誦真經告祈天地首懺前非吾亦與汝達于上帝庶解兹咎汝官職壽數已有限矣其使録之而去普跪讀感涕因焚詞謝過復遣人詣宫醮設給事中參知政事賈黄中嘗遣人投誠致禱以祈聖誨真君降言曰聖主命臣臣之事君道佐當代心依古人善惡無隱姦邪必聞君臣合道可立功勳又曰愛民用心賞罰平等但依吾語合家保安殿中承張卓嘗乞聖言真君曰大道養汝性陰陽生汝身爲吾勤行道爲吾勤修真公廉常用意憂恤在乎民遇時佐明主清濁上帝聞濁富終不久清貧爲天人莫教人道富從他人笑貧自有真家富清高不愧貧又曰形凡性不凡爲國顯清廉家積千餘口有罪自家擔又曰但服陽和氣天竈再重蒸地爐别有用道德日日新延命積福應真空若至親虚無有妙理度脫有縁人道士周務本嘗詣宫奏詞一通乞降真語真君降言曰汝有詞言慕上天其如心意隔關山仙宫不遠如指掌内外功夫全未圓陰官察録無遺過免墮酆都數百年依吾所語合吾道要履三清應不難張守真子元濟常齋戒詣宫真君降言曰汝父守真遭逢於吾故令子孫受福汝豈不知信州龍虎山張道陵至今子孫不絶亦逢於上聖得道之後廕及後世汝亦於吾有縁直須在家孝於父母食禄忠於帝王立身揚名豈非好事又誨之曰無事莫街行勤學必立名揚名在天下道廕有長生又誡曰爲過自家知善惡日相隨分明違天道問汝阿誰癡淳化中真君降言示守真曰當今顯聖明修德動三清上天歸正道四海息交兵八方欽睿聖五穀盡收成勸君須修德上帝賜長生又曰關西賊㓂縁應時數官家須指揮招捉使臣莫殺平人官家修德之際正賊須翦滅又嘗降言誡輔道士曰千人心不同萬人心皆錯舉意不相通與聖難相約真君又嘗降言戒官吏等曰每存忠信齊其天文武班行自有賢爲主萬年安基業常憂黎庶恐飢寒長行德行合其道燒香虔祝告虚玄但願國安君長久齊心輔佐太平年又嘗降言戒朝臣等曰擎天之柱著功勳包羅大海佐明君文王治世及堯日輔弼乾坤在忠臣爲主直須行决烈死生齊却戴皇恩常行吉善合其德慎終如始莫憂身進翊聖保德真君事迹表臣欽若言臣聞高穹眷命元聖膺期必有至神聿彰幽賛謨訓標於保叉雅頌載於監觀考今古之冥符見天人之交感臣欽若誠慶誠抃頓首頓首伏以靈源錫羡炎德嗣興景祚有開丕徵允赫惟玉晨之元輔奉金闕之明威降精爽不貳之民顯陰陽莫測之造佐大邦之啓運告神宗之紹圖兆自幾先聳乎聞聽由是增隆華飢茂薦徽稱鉅典崇嚴純禧響答乃至搢紳卿士横目烝黎稽首以瞻粹容洗心以佇靈誥隨其性之遠近視其器之淺深時亦戒以徽音警其蒙惑諄諄之誨咸洞其隱微蚩蚩之氓潜識其真正或魑魅爲孽夏鼎之所未刊或膏盲致妖秦醫之所難究亦復俯耹虔懇遥授指蹤真教猥臨羣邪必殄窈冥之象既炳於人寰飈欻之遊亟還於霄極永載苾芬之祀潜施睠祐之祥凡厥祕言悉存舊録將伸諭次以示方來敢謂微巨猥蒙明詔齋精仰誦盟手兢持莫覺淵沖粗伸紬繹竊念上真之茂躅實爲昭代之明徵豈夫庸瑣之才輙敢形容其事伏望崇文廣武儀天尊道寳應章感聖明仁孝皇帝陛下垂旒注覽援翰擒文賜名以紀芳蕤作序以冠篇首式彰寅奉永燿洪休臣無任瞻天望聖戰汗屏營之至其所録成翊聖保德真君事迹三卷謹隨表上進以聞臣欽若誠惶誠懼頓首頓首謹言開府儀同三司同中書門下平章事上柱國太原郡開國公臣王欽若上表批答省表具之夫妙道爲大本於若沖至神無方昭乎善應惟玉虚之元輔冠瓊簡之真階幽賛財成亶彰陰隲當藝祖之受命降福壤而炳靈逮文考之紹休告帝期而啓兆式申美報肇建殊庭奉禳禬之嚴科介蒼黔之丕祉若乃夷微委鑒肸蠁攸憑示諄誨以惟勤昭明威而匪測恍兮之應猶響泠然之馭亟旋自朕纂承寅加崇奉嚴睟儀於恭館薦嘉號於元都念祕誥之具存表格思之攸盛期於綜緝以耀休徵卿任冠樞衡道熙邦采雅資博洽庶就編聯而能紬緗帙以惟精封縹囊而來上懇求製序復冀命名載循淺昧之辭曷叙直聦之烈勉從勤請良積靦數嘉尚之懷寤興無捨所請宜依崇寧三年四月十八日使命到宫齎降到真君加號勑誥誥曰門下惟皇上帝粤有輔臣以赫厥靈終南之下屢膺景貺增焕褒章翊聖保德真君降言於建隆之初顯告於開寳之末大庇下土衛我家邦作宫奉祠昭答如響顧眇賞之誕育寔欽慈之密祈吉事有祥敢忘美報夫至誠能感克應乃孚所儲維何萬世之慶合爲丕號申命用休朕典神天永緝熙于純嘏鳳翔府上清太平宫翊聖保德真君可特加翊聖應感儲慶保德真君翊聖保德傳卷下
