body:
  text: 宋仁宗御製翊聖應感儲慶保德傳序蓋聞天心降顧邦家所以會昌靈命丕昭神道所以協贊考載籍之攸記固今古而同符矧復吾宗在于戰國基緒方始精感寔繁或山祇而見形或帝所而葉夢其來已久斯謂不誣乃有接三統而開基將隆景業冠百神而儲祐茂顯明徵奠條梅之名區號龜玉之奥主見之於翊聖應感儲慶保德真君矣太祖肇膺元歷觀德而無言太宗祗紹睿圖順期而前告若夫述玉晨之寳睠序斗極之仙階告國命之延洪示真科之祕賾洪威顯洽屏乎物魁神姦諄誨博臨揚乎天祺民祉由是靈壇爰峙徽稱斯崇欽奉於芬馨仰祈於先覺固惟九域咸被底綏豈止三秦獨增忻戴暨兹沖眇纉乃基扃仰嘉話之在人瞻至神之佑世由是載稽茂典恭益尊名以爲上帝之禎符文考之真應安可默而無述故當垂之不刊爰詔輔臣俾詮靈訓詢求斯至篇帙旋成想風烈而昭然思音徽而可覿誠足鏤之金版祕于蘭臺披封奏歸美之心願裁於序引屬一夜觀文之暇聊志於歲時題曰翊聖保德傳云爾
