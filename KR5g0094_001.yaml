front:
  text: 翊聖保德傳卷上
  hash: sha256:22be39e1654a4324677c71b6400f6e4d7de035bf6631faf67327dd235de82364
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0094_HFL_001-001a, image: hfl/1006/1006-008.png}
body:
  text: 宋開府儀同三司同中書門下平章事上柱國太原郡開國公王欽若奉勑編集翊聖保德真君建隆之初鳳翔府盩厔縣民張守真因遊終南山忽聞空中有召之者聲甚清徹守真驚懼四顧無所見默行悚聽約數里又聞語云汝若先行吾即在後如是者數日守真莫能測既還其家又聞室中曰吾受命降靈汝何為頑梗如此不聽吾言吾若不為宋朝大事當已粉碎汝矣守真方異之而且懼因曰未審是何星辰如此臨降守真性本愚戇且昧神祇願勿憑凌必無事奉乃曰吾是高天大聖玉帝輔臣授命衛時乘龍降世但以非正直之士無以奉吾教汝有異骨不類常流汝可虔心奉吾道訓也守真曰竊聞在男曰巫在女曰覡守真雖處凡庸恥為兹類又曰吾上天之神非鬼魁也五嶽四瀆吾能役使汝若回心入道勤奉香火當令汝應大國之徵命受真主之恩遇豈同巫覡之輩耶守真曰神人既若此教導敢不虔事乃設酒肉之饌以祀焉又聞言曰吾是神人也汝何為以膻穢瀆我以汝未曉不欲罪汝此後但以香茶及素食鮮果為供吾雖不食歆汝之意也守真稽首而謝又曰吾為汝天上之師汝别有人間之師可但訪高士以求度焉守真乃禮古樓觀先生梁筌為師度為道士遂於所居之側擇隙地出家財搆北帝宫內立殿以事神旦暮崇奉頗極精至神謂之曰觀汝虔心稱吾教導貞潔之士可以驅邪吾先將誨汝劒法俾汝為民除妖後當令汝結壇俾汝為國祈福守真再拜曰守真本實凡庸粗懷愚直當緣夙生奉事乃致今獲歸依願以至心永奉靈德壇儀劒法恭俟靈訓真君曰劒法有三但以銅鐵煆為利刃吾目一視便可用也有疾之人俾汝揮擊邪氣銷鑠其人無損或地祇作孽水族生妖分野為灾國家軫慮當以上劒治之或山澤之怪飛走之雄震駭閭閻侵毒黎庶當以中劒治之或魑魅之徒夔魖之輩挾邪暴物作祟害人當以下劍治之守真曰三劍之法已聞命矣結壇之儀伏俟指教真君曰結壇之法有九上三壇則為國家設之其上曰順天興國壇凡星位三千六百為普天大醮旌旗鑑劒弓矢法物羅列次序開建門户具有儀範其中曰延祚保生壇凡星位二千四百為周天大醮法物儀範降上壇一等其下曰祈穀福時壇凡星位一千二百為羅天大醮法物儀範降中壇一等儻非時禱祀不及備此三壇亦當精潔詞章鮮異花果扣鼓集神懇禱而告去地九尺焚香以奏亦可感應也中三壇則為臣寮設之其上曰黃籙延壽壇凡星位六百四十其中曰黃籙臻慶壇凡星位四百九十其下曰黃籙去邪壇凡星位三百六十此三壇所用法物儀範各有差降下三壇則為士庶設之其上曰續命壇凡星位二百四十其中曰集福壇凡星位一百二十其下曰却灾壇凡星位八十一所用儀範量有等差此九壇之外别有應物壇或六十四位或四十九位或二十四位法物所須各以差降士民之類可量力而為之如臣庶上為帝王祈祐當作祈穀福時壇凡一千二百位或為父母師尊禳灾祈福當為醮設壇隨宜增益也守真拜而受之自爾多有徵驗不能備紀乾德中太宗皇帝方在晉邸頗聞靈應乃遣近侍齎信幣香燭就宫致醮使者齊戒焚香告曰晉王久欽靈異欲備俸緡增修殿宇仍表乞勑賜官名真君曰吾將來運值太平君宋朝第二主修上清太平宫建十二座堂殿儼三界中星辰自有時日不可容易而言但為吾啓大王言此宫觀上天已定增建年月也今猶未可使者歸以聞太宗驚異而止太祖皇帝素聞之未甚信異遣使齎香燭清詞就宫致禱因召守真詣闕備詢其事守真具言之且曰非精誠懇至不能降其神仍以上聖降靈事迹一一聞奏太祖召小黃門長嘯於側謂守真曰神人之言若此乎守真曰陛下儻謂臣妖妄乞賜按驗戮臣於市勿以斯言褻瀆上聖詔守真止於建隆觀翌日遣內臣王繼恩就觀醮設移時未有所聞繼恩再拜虔告須臾真君降言曰吾乃高天大聖玉帝輔臣蓋遵符命降衛宋朝社稷來定遐長基業固非山林魑魅之類也今乃使小兒呼嘯以比吾言斯為不可汝但說與官家言天上宫闕已成玉鎖開晉王有仁心晉王有仁心凡百餘言繼恩惶懼不敢隱具録以奏因復面言神音歷歷聞者兢悚太祖默然異之時開寶九年十月十九日之夕也翌日太祖升遐太宗嗣位尋召守真於瓊林苑為周天大醮作延祚保生壇醮罷真君降言於內臣王繼恩曰吾有言汝當為吾奏之曰建隆元年奉帝言乘龍下降衛人君掃除妖孽猶間事縱橫整頓立乾坤國祚已興長安泰兆民樂業保天真八方效貢來稽首萬靈震伏自稱臣親王祝壽須焚禱遞相虔潔向君親吾有捷疾一百萬諸位靈官萬億人若行忠孝吾加福若行悖逆必誅身賞罰行之既平等天無氛穢地無塵愛民治國勝前代萬年基業永長新繼恩録之於簡翌日以聞太宗覽之驚異稽首謝曰家國之幸宗廟之慶虔荷上聖賜以格言命緘藏於內殿尋遣內供奉官王守節起居舍人王龜從就終南山下築宫方卜地於終南鎮真君忽降言於龜從等曰此地乃修建上帝宫闕之地不可易也於是乃定凡三年宫成中正之位列四大殿前則玉皇通明殿次紫微殿次七元殿次則真君所御殿東廡之外有天蓬九曜東斗天地水三官四殿西廡之外有真武十二元辰西斗天曹四殿又有靈官堂龍堂南斗閣並列星宿諸神之像竪鍾經二樓齊道堂室靡不完備建碑以紀其事題曰上清太平宫一如真君預言之制命常參官一人監宫擇道士焚修每歲三元及誕節上本命日並遣中使致醮祀神之夕上望拜焉歲或水旱或國家將舉事卒致禱焉初宫成真君忽降言謂王龜從等曰汝奉詔修宫勤則至矣然何為不開日月華門不畫八小殿壁階墀甓甃亦未嚴備唯求速成以冀恩寵然上天亦不掩爾功亦不赦爾罪守節龜從頗切驚懼然已奏訖役不及增備惟稽首祈謝而去至闕皆獲增秩賜白金千兩既而守節染疾而亡龜從殁於兵刃此乃不掩功不赦罪之戒明矣太平興國初太宗皇帝親征太原真君忽降言於守真曰官家已臨汾晉非久克復城池汝當令監宫臣等設醮以謝勝捷於上帝守真等曰國家大事乞俟捷音真君曰上天已定勝負也踰旬而王師告捷監宫等以聞帝遣內臣盧文壽齎內庫香藥御署詞章詣宫陳醮以謝上帝是夕真君降言曰官家設此大醮上帝與諸天皆喜國祚延遠過於有唐興國六年守真以乾明節詣闕朝賀召見因面奏曰聖真下降俯為昌朝乞降詔加號以靈貺上允其奏尋下詔曰太平宫神受命上穹降靈下土苾芬𦤺薦肹蠁有徵大庇斯民屢垂丕貺宜加美號以答神休其封神為翊聖將軍詔命至宫守真焚香以告真君忽降言曰汝當上問官家所言翊聖者翊於何聖守真數日疑懼不敢答復降言曰汝但馳奏官家不罪汝守真遂具章以聞太宗覽之召近臣謂之曰玉皇輔臣所輔翊者上帝也當以此意報守真令啓白也既而內臣傳命到宫守真詣殿焚香以告真君曰此意是也七年守真復詣闕朝賀真君忽降言曰吾有言汝當聞於官家曰大道興陰謀滅諸天衆聖皆欣悅宋朝社稷甚延年太平景運初興發君上端心顯明哲愛民治國常須切萬年基業永長新金枝玉葉無休歇守真得之到闕以聞詔賜守真紫衣號崇元大師自後每遣使醮告真君或有言守真皆密以聞至道初忽降言謂守真曰吾建隆之初奉上帝命下降衛時今基業已成社稷方永承平之世將繼有明君吾已有期却歸天上汝等不復聞吾言矣儻國家祈禱但嚴潔焚香北面告吾雖不降言當授福衛護宗社又曰汝遇吾下降至今三十五年勤亦多矣上帝已有符命授汝為五土之主此限滿日升汝仙官汝亦不久住也自是不復降言明年閏七月十六日守真謂門人等曰吾已領符命今將去矣言訖而化既而聖上嗣位崇奉之典率遵舊式洎受元符封泰山建玉清昭應宫於宫中寶符閣之西北隅作凝命殿殿後為凝命閣以奉真君大中祥符七年詔曰誕敷寶命仰荷於至神昭報殊徵虔增於懿號蓋為邦之大典庇民之深旨也而況翊宣元化表式衆靈司陰隲於含生播明威於福地當王基肇啓固降治而已彰洎文考續承復先期而斯應由是亟營珍館備薦徽章蒙介福於無垠佐鴻圖於纍盛顧惟眇質紹撫綿區屬典禮之交修實祺祥之沓委緬懷幽贊敢怠欽崇是用益以丕稱奉之茂則式達至精之懇庶申祗答之文期克享於寅恭永保寧於品彙爰頒成命俯告宰司深體豫懷共宣其事翊聖將軍冝加號曰翊聖保德真君翊聖保德傳卷上
